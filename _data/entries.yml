  en:
    title: Design Principles Behind Smalltalk
    eyebrow: Daniel H. H. Ingalls · BYTE Magazine, August 1981
    blurb: >-
      Ingalls’ article, mirrored as a static page that asks nothing of the
      reader but a browser. Seventeen principles, each one addressable by its
      own number, in English and Spanish. The page’s rule system is drawn from
      the article’s own Figure 1: solid for what is said, dashed for the
      context that makes it mean anything.
