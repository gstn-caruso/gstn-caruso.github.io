  es:
    title: Principios de diseño detrás de Smalltalk
    eyebrow: Daniel H. H. Ingalls · BYTE Magazine, agosto de 1981
    blurb: >-
      El artículo de Ingalls, espejado como una página estática que no le pide
      al lector más que un navegador. Diecisiete principios, cada uno
      direccionable por su número, en inglés y en castellano. El sistema de
      reglas de la página sale de la Figura 1 del propio artículo: sólida para
      lo que se dice, punteada para el contexto que lo hace significar algo.
    url: https://gstn-caruso.github.io/design-principles-behind-smalltalk/es/
